name: ci

on:
  pull_request:
  push:
    branches: ["main", "stable/**"]

jobs:
  tox:
    runs-on: depot-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [pep8, py3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup "uv"
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Run "tox"
        run: uvx --with tox-uv-bare tox -e ${{ matrix.environment }}
        env:
          TOX_CONSTRAINTS_FILE: https://raw.githubusercontent.com/${{ github.repository_owner }}/requirements/${{ github.base_ref || github.ref_name }}/upper-constraints.txt
          TOX_OVERRIDE: "tox.requires+=tox-uv-bare;testenv.install_command=uv pip install {opts} {packages};testenv.base_python=3.14"

      - name: Create test results directory
        if: ${{ matrix.environment != 'pep8' && !cancelled() }}
        run: mkdir -p test-results

      - name: Convert test results to JUnit XML
        if: ${{ matrix.environment != 'pep8' && !cancelled() }}
        run: |
          uvx --with tox-uv-bare tox -q exec -e ${{ matrix.environment }} -- \
            stestr last --subunit |
            uvx --from python-subunit --with junitxml subunit2junitxml \
              --output-to test-results/${{ matrix.environment }}.xml

      - name: Report test results
        if: ${{ matrix.environment != 'pep8' && !cancelled() }}
        uses: depot/test-report-action@2ad5779840a9c63e884fa26f11d019768a27a941 # v1.0.1
        with:
          path: test-results/${{ matrix.environment }}.xml
